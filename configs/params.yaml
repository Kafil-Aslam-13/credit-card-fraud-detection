test_size: 0.2
random_state: 42

smote:
  sampling_strategy: 0.5
  random_state: 42
  k_neighbors: 5


model:
  name: "xgboost"
  params:
    n_estimators: 300
    max_depth: 5
    learning_rate: 0.05
    subsample: 0.8
    colsample_bytree: 0.8
    eval_metric: "auc"
    random_state: 42

evaluation:
  threshold: 0.5
